<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberFlow - Sistema de Agendamentos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f8f9ff;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ff4757;
            color: white;
            width: auto;
            padding: 10px 20px;
        }

        .error {
            color: #ff4757;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #2ed573;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success.show {
            display: block;
        }

        .link-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .link-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .link-text a:hover {
            text-decoration: underline;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            position: relative;
            bottom: -2px;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .user-info {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info span {
            color: #333;
            font-weight: 500;
        }

        .haircuts-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .haircut-item {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .haircut-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .haircut-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .haircut-price {
            color: #667eea;
            font-weight: 600;
        }

        .haircut-duration {
            color: #999;
            font-size: 13px;
        }

        .hidden {
            display: none;
        }

        .admin-panel {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
        }

        .admin-panel h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .admin-section {
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
        }

        .appointments-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .appointment-item {
            border: 1px solid #e0e0e0;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .appointment-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status-confirmed {
            background: #2ed573;
            color: white;
        }

        .status-pending {
            background: #ffa502;
            color: white;
        }

        .icon {
            font-size: 20px;
            margin-right: 5px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 22px;
            }

            .content {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Header -->
            <div class="header">
                <h1><span class="icon">✂️</span>BarberFlow</h1>
                <p>Sistema de Agendamentos</p>
            </div>

            <!-- Content -->
            <div class="content">
                <!-- Success Message -->
                <div class="success" id="successMsg"></div>

                <!-- Auth Section -->
                <div id="authSection">
                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchAuthTab('login')">📝 Entrar</button>
                        <button class="tab-btn" onclick="switchAuthTab('register')">✍️ Cadastro</button>
                    </div>

                    <!-- Login Tab -->
                    <div id="loginTab" class="tab-content active">
                        <form onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="loginEmail" required placeholder="seu@email.com">
                                <div class="error" id="loginEmailError"></div>
                            </div>

                            <div class="form-group">
                                <label>Senha</label>
                                <input type="password" id="loginPassword" required placeholder="••••••••">
                                <div class="error" id="loginPasswordError"></div>
                            </div>

                            <button type="submit" class="btn btn-primary">Entrar</button>
                            <a href="#" onclick="switchAuthTab('forgot')" style="color: #667eea; text-decoration: none; display: block; text-align: center; font-size: 13px; margin-top: 10px;">Esqueceu a senha?</a>
                        </form>
                    </div>

                    <!-- Register Tab -->
                    <div id="registerTab" class="tab-content hidden">
                        <form onsubmit="handleRegister(event)">
                            <div class="form-group">
                                <label>Nome Completo</label>
                                <input type="text" id="registerName" required placeholder="João Silva">
                                <div class="error" id="registerNameError"></div>
                            </div>

                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="registerEmail" required placeholder="seu@email.com">
                                <div class="error" id="registerEmailError"></div>
                            </div>

                            <div class="form-group">
                                <label>Senha (mínimo 6 caracteres)</label>
                                <input type="password" id="registerPassword" required placeholder="••••••••" minlength="6">
                                <div class="error" id="registerPasswordError"></div>
                            </div>

                            <button type="submit" class="btn btn-primary">Cadastrar</button>
                        </form>

                        <div class="link-text">
                            Já tem conta? <a onclick="switchAuthTab('login')">Faça login</a>
                        </div>
                    </div>

                    <!-- Forgot Password Tab -->
                    <div id="forgotTab" class="tab-content hidden">
                        <form onsubmit="handleForgotPassword(event)">
                            <div class="form-group">
                                <label>Email para recuperação</label>
                                <input type="email" id="forgotEmail" required placeholder="seu@email.com">
                                <div class="error" id="forgotEmailError"></div>
                            </div>

                            <button type="submit" class="btn btn-primary">Enviar Link de Reset</button>
                            <button type="button" class="btn btn-secondary" onclick="switchAuthTab('login')">Voltar</button>
                        </form>
                    </div>
                </div>

                <!-- Main App Section (Hidden until login) -->
                <div id="appSection" class="hidden">
                    <div class="user-info">
                        <span>👤 <span id="userName">Usuário</span></span>
                        <button class="btn-danger" onclick="handleLogout()">Sair</button>
                    </div>

                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchTab('catalog')">📸 Catálogo</button>
                        <button class="tab-btn" onclick="switchTab('appointments')">📅 Meus Agendamentos</button>
                        <button class="tab-btn" id="adminTab" class="hidden" onclick="switchTab('admin')">⚙️ Admin</button>
                    </div>

                    <!-- Catalog Tab -->
                    <div id="catalogTab" class="tab-content active">
                        <h3>Escolha um corte</h3>
                        <div class="haircuts-list" id="haircutsList"></div>
                    </div>

                    <!-- Appointments Tab -->
                    <div id="appointmentsTab" class="tab-content hidden">
                        <h3>Seus Agendamentos</h3>
                        <div class="appointments-list" id="appointmentsList"></div>
                    </div>

                    <!-- Admin Tab -->
                    <div id="adminTab" class="tab-content hidden">
                        <div class="admin-panel">
                            <h3>⚙️ Painel do Administrador</h3>
                        </div>

                        <div class="admin-section">
                            <h4>Gerenciar Cortes</h4>
                            <form onsubmit="handleAddHaircut(event)">
                                <div class="form-group">
                                    <label>Nome do Corte</label>
                                    <input type="text" id="haircutName" required>
                                </div>
                                <div class="form-group">
                                    <label>Preço (R$)</label>
                                    <input type="number" id="haircutPrice" step="0.01" required>
                                </div>
                                <div class="form-group">
                                    <label>Duração (minutos)</label>
                                    <input type="number" id="haircutDuration" required>
                                </div>
                                <button type="submit" class="btn btn-primary">Adicionar Corte</button>
                            </form>
                        </div>

                        <div class="admin-section">
                            <h4>Todos os Agendamentos</h4>
                            <div class="appointments-list" id="allAppointmentsList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== STORAGE ====================
        const storage = {
            getUsers: () => JSON.parse(localStorage.getItem('users') || '{}'),
            setUsers: (users) => localStorage.setItem('users', JSON.stringify(users)),
            
            getHaircuts: () => JSON.parse(localStorage.getItem('haircuts') || '[]'),
            setHaircuts: (haircuts) => localStorage.setItem('haircuts', JSON.stringify(haircuts)),
            
            getAppointments: () => JSON.parse(localStorage.getItem('appointments') || '[]'),
            setAppointments: (appointments) => localStorage.setItem('appointments', JSON.stringify(appointments)),
            
            getCurrentUser: () => JSON.parse(localStorage.getItem('currentUser') || 'null'),
            setCurrentUser: (user) => localStorage.setItem('currentUser', JSON.stringify(user)),
        };

        // ==================== STATE ====================
        let currentUser = storage.getCurrentUser();

        // ==================== INITIALIZATION ====================
        function initializeApp() {
            // Default haircuts
            if (storage.getHaircuts().length === 0) {
                storage.setHaircuts([
                    { id: '1', name: 'Corte Básico', price: 30, duration: 30 },
                    { id: '2', name: 'Corte + Barba', price: 50, duration: 45 },
                    { id: '3', name: 'Corte + Pigmentação', price: 70, duration: 60 },
                    { id: '4', name: 'Tratamento Capilar', price: 100, duration: 60 }
                ]);
            }

            if (currentUser) {
                showAppSection();
            } else {
                showAuthSection();
            }
        }

        // ==================== VALIDATIONS ====================
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function clearErrors() {
            document.querySelectorAll('.error').forEach(el => el.classList.remove('show'));
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            if (element) {
                element.textContent = message;
                element.classList.add('show');
            }
        }

        function showSuccess(message) {
            const element = document.getElementById('successMsg');
            element.textContent = message;
            element.classList.add('show');
            setTimeout(() => element.classList.remove('show'), 3000);
        }

        // ==================== AUTH ====================
        function handleLogin(event) {
            event.preventDefault();
            clearErrors();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            // Validation
            if (!validateEmail(email)) {
                showError('loginEmailError', 'Email inválido');
                return;
            }

            if (password.length < 6) {
                showError('loginPasswordError', 'Senha deve ter mínimo 6 caracteres');
                return;
            }

            // Check user
            const users = storage.getUsers();
            const user = Object.values(users).find(u => u.email === email && u.password === password);

            if (!user) {
                showError('loginPasswordError', 'Email ou senha incorretos');
                return;
            }

            currentUser = user;
            storage.setCurrentUser(user);
            showSuccess('Login realizado com sucesso!');
            setTimeout(showAppSection, 1000);
        }

        function handleRegister(event) {
            event.preventDefault();
            clearErrors();

            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            // Validation
            if (name.length < 3) {
                showError('registerNameError', 'Nome deve ter mínimo 3 caracteres');
                return;
            }

            if (!validateEmail(email)) {
                showError('registerEmailError', 'Email inválido');
                return;
            }

            if (password.length < 6) {
                showError('registerPasswordError', 'Senha deve ter mínimo 6 caracteres');
                return;
            }

            // Check if email exists
            const users = storage.getUsers();
            if (Object.values(users).some(u => u.email === email)) {
                showError('registerEmailError', 'Este email já está cadastrado');
                return;
            }

            // Create user
            const userId = 'user_' + Date.now();
            const newUser = {
                id: userId,
                name,
                email,
                password,
                role: 'user',
                createdAt: new Date().toISOString()
            };

            users[userId] = newUser;
            storage.setUsers(users);

            currentUser = newUser;
            storage.setCurrentUser(newUser);

            showSuccess('Cadastro realizado com sucesso!');
            setTimeout(showAppSection, 1000);
        }

        function handleForgotPassword(event) {
            event.preventDefault();
            clearErrors();

            const email = document.getElementById('forgotEmail').value;

            if (!validateEmail(email)) {
                showError('forgotEmailError', 'Email inválido');
                return;
            }

            const users = storage.getUsers();
            const user = Object.values(users).find(u => u.email === email);

            if (!user) {
                showError('forgotEmailError', 'Email não encontrado');
                return;
            }

            showSuccess('Email de recuperação enviado! (Verificar inbox/spam)');
            setTimeout(() => switchAuthTab('login'), 2000);
        }

        function handleLogout() {
            if (confirm('Tem certeza que quer sair?')) {
                currentUser = null;
                storage.setCurrentUser(null);
                showAuthSection();
                clearErrors();
            }
        }

        // ==================== TAB NAVIGATION ====================
        function switchAuthTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            if (tab === 'login') {
                document.getElementById('loginTab').classList.add('active');
            } else if (tab === 'register') {
                document.getElementById('registerTab').classList.add('active');
            } else if (tab === 'forgot') {
                document.getElementById('forgotTab').classList.add('active');
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('#catalogTab, #appointmentsTab, #adminTab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            if (tab === 'catalog') {
                document.getElementById('catalogTab').classList.add('active');
                loadHaircuts();
            } else if (tab === 'appointments') {
                document.getElementById('appointmentsTab').classList.add('active');
                loadMyAppointments();
            } else if (tab === 'admin') {
                document.getElementById('adminTab').classList.add('active');
                loadAllAppointments();
            }
        }

        // ==================== HAIRCUTS ====================
        function loadHaircuts() {
            const haircuts = storage.getHaircuts();
            const html = haircuts.map(h => `
                <div class="haircut-item" onclick="bookHaircut('${h.id}', '${h.name}', ${h.price})">
                    <div class="haircut-name">✂️ ${h.name}</div>
                    <div class="haircut-price">R$ ${h.price.toFixed(2)}</div>
                    <div class="haircut-duration">⏱️ ${h.duration} minutos</div>
                </div>
            `).join('');
            document.getElementById('haircutsList').innerHTML = html || '<p>Nenhum corte disponível</p>';
        }

        function bookHaircut(id, name, price) {
            const date = prompt('Data (YYYY-MM-DD):');
            if (!date) return;

            const time = prompt('Hora (HH:MM):');
            if (!time) return;

            const appointments = storage.getAppointments();
            const appointment = {
                id: 'apt_' + Date.now(),
                userId: currentUser.id,
                haircutId: id,
                haircutName: name,
                price,
                date,
                time,
                status: 'pending',
                createdAt: new Date().toISOString()
            };

            appointments.push(appointment);
            storage.setAppointments(appointments);
            showSuccess('Agendamento realizado com sucesso!');
        }

        // ==================== APPOINTMENTS ====================
        function loadMyAppointments() {
            const appointments = storage.getAppointments().filter(a => a.userId === currentUser.id);
            const html = appointments.map(a => `
                <div class="appointment-item">
                    <div><strong>${a.haircutName}</strong></div>
                    <div>📅 ${a.date} às ${a.time}</div>
                    <div>R$ ${a.price.toFixed(2)}</div>
                    <span class="appointment-status ${a.status === 'confirmed' ? 'status-confirmed' : 'status-pending'}">
                        ${a.status === 'confirmed' ? '✓ Confirmado' : '⏳ Pendente'}
                    </span>
                </div>
            `).join('');
            document.getElementById('appointmentsList').innerHTML = html || '<p>Nenhum agendamento</p>';
        }

        function loadAllAppointments() {
            const appointments = storage.getAppointments();
            const html = appointments.map(a => {
                const user = Object.values(storage.getUsers()).find(u => u.id === a.userId);
                return `
                    <div class="appointment-item">
                        <div><strong>${a.haircutName}</strong> - ${user?.name}</div>
                        <div>📅 ${a.date} às ${a.time}</div>
                        <div>R$ ${a.price.toFixed(2)}</div>
                        <span class="appointment-status ${a.status === 'confirmed' ? 'status-confirmed' : 'status-pending'}">
                            ${a.status === 'confirmed' ? '✓ Confirmado' : '⏳ Pendente'}
                        </span>
                        <button onclick="confirmAppointment('${a.id}')" style="margin-top: 8px; padding: 5px 10px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer;">
                            Confirmar
                        </button>
                    </div>
                `;
            }).join('');
            document.getElementById('allAppointmentsList').innerHTML = html || '<p>Nenhum agendamento</p>';
        }

        function confirmAppointment(aptId) {
            const appointments = storage.getAppointments();
            const apt = appointments.find(a => a.id === aptId);
            if (apt) {
                apt.status = 'confirmed';
                storage.setAppointments(appointments);
                loadAllAppointments();
                showSuccess('Agendamento confirmado!');
            }
        }

        // ==================== ADMIN ====================
        function handleAddHaircut(event) {
            event.preventDefault();
            
            const name = document.getElementById('haircutName').value;
            const price = parseFloat(document.getElementById('haircutPrice').value);
            const duration = parseInt(document.getElementById('haircutDuration').value);

            const haircuts = storage.getHaircuts();
            haircuts.push({
                id: 'haircut_' + Date.now(),
                name,
                price,
                duration
            });

            storage.setHaircuts(haircuts);
            showSuccess('Corte adicionado com sucesso!');
            event.target.reset();
        }

        // ==================== UI STATE ====================
        function showAuthSection() {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('appSection').classList.add('hidden');
            document.getElementById('adminTab').classList.add('hidden');
        }

        function showAppSection() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('userName').textContent = currentUser.name;
            
            // Show admin tab if user is admin
            if (currentUser.role === 'admin') {
                document.getElementById('adminTab').classList.remove('hidden');
            }

            loadHaircuts();
        }

        // ==================== STARTUP ====================
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
